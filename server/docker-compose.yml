version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wt-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: warthunder123
      MYSQL_DATABASE: warthunder
      MYSQL_USER: wtuser
      MYSQL_PASSWORD: wtpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 后端服务
  api:
    build: .
    container_name: wt-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: wtuser:wtpassword@tcp(mysql:3306)/warthunder?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: wt-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  mysql_data:
